global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    # Drop internal OTel Collector self-metrics (noisy)
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "otelcol_.*"
        action: drop
