receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  batch:
    timeout: 5s
    send_batch_size: 512
  resource:
    attributes:
      - key: deployment.environment
        value: "demo"
        action: upsert

exporters:
  # Prometheus scrape endpoint — metrics forwarded here from app
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: oracle_otel
    resource_to_telemetry_conversion:
      enabled: true

  # Tempo receives traces via OTLP
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Debug logging (set verbosity: detailed to see full span content)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus, debug]

  telemetry:
    logs:
      level: warn
